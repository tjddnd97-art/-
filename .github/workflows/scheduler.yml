name: Financial Alert Bot

on:
  workflow_dispatch:     # 수동 실행 버튼 (테스트용)
  schedule:
    - cron: '0 0 * * *'  # 매일 UTC 0시 = 한국 시간 오전 9시 자동 실행

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      RESEND_KEY: ${{ secrets.RESEND_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: npm install
      - name: Run Bot
        run: node bot.js
